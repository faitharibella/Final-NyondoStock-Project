<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NyondoStock - Sales Dashboard</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #121212;
      color: #e5e5e5;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .navbar {
      background-color: #000;
    }
    .navbar-brand, .nav-link {
      color: #e5e5e5 !important;
      font-weight: 500;
    }
    .nav-link:hover {
      color: #d4af37 !important;
    }
    h1 {
      color: #d4af37;
    }
    .btn-gold {
      background-color: #d4af37;
      color: #000;
      font-weight: bold;
      transition: 0.3s;
    }
    .btn-gold:hover {
      background-color: #b9972c;
      color: #fff;
      box-shadow: 0 0 10px #d4af37;
    }
    .card {
      background: #1e1e1e;
      border-radius: 10px;
      border: 1px solid #444;
      margin-bottom: 1.5rem;
    }
    .table {
      color: #e5e5e5;
    }
    .table thead {
      background: #2c2c2c;
      color: #d4af37;
    }
    .table tbody tr:hover {
      background-color: #2c2c2c;
    }
    .badge-success {
      background-color: #28a745;
    }
    .badge-warning {
      background-color: #ffc107;
      color: #000;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
  <div class="container-fluid">
    <a class="navbar-brand text-warning" href="#">NyondoStock - Sales Dashboard</a>
    <button class="btn btn-danger ms-auto">Logout</button>
  </div>
</nav>

<!-- Page Header -->
<div class="container mt-4">
  <h1>Products</h1>
  <p class="text-muted">Browse and manage available products</p>
</div>

<!-- Search + Add Product -->
<div class="container mb-3">
  <div class="row">
    <div class="col-md-8 mb-2">
      <input type="text" id="searchBar" class="form-control" placeholder="Search products by name...">
    </div>
    <div class="col-md-4 text-md-end">
      <button class="btn btn-gold" data-bs-toggle="modal" data-bs-target="#addProductModal">Add Product</button>
    </div>
  </div>
</div>

<!-- Products Table -->
<div class="container">
  <div class="card">
    <div class="card-body">
      <table class="table table-dark table-striped" id="productsTable">
        <thead>
          <tr>
            <th>Product Name</th>
            <th>Category</th>
            <th>Price (UGX)</th>
            <th>Quantity</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="productList">
          <!-- Products will be injected here -->
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Add Product Modal -->
<div class="modal fade" id="addProductModal" tabindex="-1" aria-labelledby="addProductModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content bg-dark text-white">
      <div class="modal-header">
        <h5 class="modal-title text-warning" id="addProductModalLabel">Add New Product</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="addProductForm">
          <div class="mb-3">
            <label for="productName" class="form-label">Product Name</label>
            <input type="text" class="form-control" id="productName" required>
          </div>
          <div class="mb-3">
            <label for="category" class="form-label">Category</label>
            <input type="text" class="form-control" id="category" required>
          </div>
          <div class="mb-3">
            <label for="price" class="form-label">Price (UGX)</label>
            <input type="number" class="form-control" id="price" required>
          </div>
          <div class="mb-3">
            <label for="quantity" class="form-label">Quantity</label>
            <input type="number" class="form-control" id="quantity" required>
          </div>
          <button type="submit" class="btn btn-gold">Submit</button>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS + Custom JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const products = [
    { name: "Hammer", category: "Tools", price: 15000, quantity: 50 },
    { name: "Nails", category: "Hardware", price: 2000, quantity: 200 },
    { name: "Cement", category: "Building Materials", price: 30000, quantity: 8 },
    { name: "Screwdriver", category: "Tools", price: 10000, quantity: 5 },
    { name: "Paint", category: "Building Materials", price: 25000, quantity: 15 }
  ];

  function renderProducts(list) {
    const tableBody = document.getElementById("productList");
    tableBody.innerHTML = "";
    list.forEach(p => {
      const status = p.quantity > 10 
        ? '<span class="badge badge-success">In Stock</span>' 
        : '<span class="badge badge-warning">Low Stock</span>';
      const row = `
        <tr>
          <td>${p.name}</td>
          <td>${p.category}</td>
          <td>${p.price.toLocaleString()} UGX</td>
          <td>${p.quantity}</td>
          <td>${status}</td>
        </tr>
      `;
      tableBody.innerHTML += row;
    });
  }

  // Initial render
  renderProducts(products);

  // Search filter
  document.getElementById("searchBar").addEventListener("keyup", function() {
    const query = this.value.toLowerCase();
    const filtered = products.filter(p => p.name.toLowerCase().includes(query));
    renderProducts(filtered);
  });

  // Add Product Form
  document.getElementById("addProductForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const name = document.getElementById("productName").value;
    const category = document.getElementById("category").value;
    const price = parseInt(document.getElementById("price").value);
    const quantity = parseInt(document.getElementById("quantity").value);

    products.push({ name, category, price, quantity });
    renderProducts(products);

    // Reset form and close modal
    document.getElementById("addProductForm").reset();
    const modal = bootstrap.Modal.getInstance(document.getElementById("addProductModal"));
    modal.hide();
  });
</script>
</body>
</html>
