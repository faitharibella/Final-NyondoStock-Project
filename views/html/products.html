<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NyondoStock - Sales Dashboard</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/public/css/dashboard.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
  <div class="container-fluid">
    <a class="navbar-brand text-warning" href="#">NyondoStock - Sales Dashboard</a>
          <button
        class="btn btn-gold ms-auto"
        onclick="window.location.href = 'admindash.html'"
      >
         Back
      </button>
  </div>
</nav>

<!-- Page Header -->
<div class="container mt-4">
  <h1>Products</h1>
  <p class="text-muted">Browse and manage available products</p>
</div>

<!-- Search + Add Product -->
<div class="container mb-3">
  <div class="row">
    <div class="col-md-8 mb-2">
      <input type="text" id="searchBar" class="form-control" placeholder="Search products by name...">
    </div>
    <div class="col-md-4 text-md-end">
      <button class="btn btn-gold" data-bs-toggle="modal" data-bs-target="#addProductModal">Add Product</button>
    </div>
  </div>
</div>

<!-- Products Table -->
<div class="container">
  <div class="card">
    <div class="card-body">
      <table class="table table-dark table-striped" id="productsTable">
        <thead>
          <tr>
            <th>Product Name</th>
            <th>Category</th>
            <th>Price (UGX)</th>
            <th>Quantity</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="productList">
          <!-- Products will be injected here -->
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Add Product Modal -->
<div class="modal fade" id="addProductModal" tabindex="-1" aria-labelledby="addProductModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content bg-dark text-white">
      <div class="modal-header">
        <h5 class="modal-title text-warning" id="addProductModalLabel">Add New Product</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="addProductForm" action="" method="">
          <div class="mb-3">
            <label for="productName" class="form-label">Product Name</label>
            <input type="text" name="productname" class="form-control" id="productName" required>
          </div>
          <div class="mb-3">
            <label for="category" class="form-label">Category</label>
            <input type="text" name="category" class="form-control" id="category" required>
          </div>
          <div class="mb-3">
            <label for="price" class="form-label">Price (UGX)</label>
            <input type="number" name="price" class="form-control" id="price" required>
          </div>
          <div class="mb-3">
            <label for="quantity" class="form-label">Quantity</label>
            <input type="number" name="quantity" class="form-control" id="quantity" required>
          </div>
          <button type="submit" class="btn btn-gold">Submit</button>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS + Custom JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/public/Js/products.js"></script>
</body>
</html>
