<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NyondoStock - Transport Calculator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/public/css/dashboard.css">
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container-fluid">
    <a class="navbar-brand text-warning fw-bold" href="admindashboard.html">NyondoStock Admin</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link text-warning" href="admindash.html">Back</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card">
        <div class="card-header text-center">
          <h4> Transport Cost Calculator</h4>
        </div>
        <div class="card-body">
          <form id="transportForm">
            <div class="mb-3">
              <label class="form-label">Customer Name</label>
              <input type="text" id="customerName" class="form-control" placeholder="Enter customer name">
            </div>
            <div class="mb-3">
              <label class="form-label">Delivery Location</label>
              <input type="text" id="location" class="form-control" placeholder="Enter delivery address">
            </div>
            <div class="mb-3">
              <label class="form-label">Distance (Kilometers)</label>
              <input type="number" id="distance" class="form-control" placeholder="Enter distance in km" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Weight (Kilograms)</label>
              <input type="number" id="weight" class="form-control" placeholder="Enter total weight in kg" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Rate per km (UGX)</label>
              <input type="number" id="ratePerKm" class="form-control" value="500" readonly>
            </div>
            <div class="mb-3">
              <label class="form-label">Rate per kg (UGX)</label>
              <input type="number" id="ratePerKg" class="form-control" value="200" readonly>
            </div>
            <hr class="border-secondary">
            <div class="mb-3 text-center">
              <label class="form-label fw-bold"> Total Transport Cost</label>
              <h2 class="text-warning" id="totalCost">UGX 0</h2>
            </div>
            <button type="button" class="btn btn-gold w-100" onclick="calculateTransport()">Calculate Cost</button>
            <button type="button" class="btn btn-outline-gold w-100 mt-2" onclick="resetForm()">Reset</button>
          </form>
        </div>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card">
        <div class="card-header"> Recent Transport Orders</div>
        <div class="card-body">
          <table class="table">
            <thead>
              <tr><th>Customer</th><th>Distance</th><th>Weight</th><th>Cost</th><th>Date</th></tr>
            </thead>
            <tbody>
              <tr><td>John Otim</td><td>10 km</td><td>50 kg</td><td>UGX 15,000</td><td>Today</td></tr>
              <tr><td>Mary Achieng</td><td>5 km</td><td>20 kg</td><td>UGX 6,500</td><td>Yesterday</td></tr>
              <tr><td>Peter Okoth</td><td>15 km</td><td>100 kg</td><td>UGX 27,500</td><td>2026-04-28</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  function calculateTransport() {
    var distance = document.getElementById('distance').value;
    var weight = document.getElementById('weight').value;
    var ratePerKm = 500;
    var ratePerKg = 200;
    
    if(distance && weight && distance > 0 && weight > 0) {
      var cost = (distance * ratePerKm) + (weight * ratePerKg);
      document.getElementById('totalCost').innerHTML = 'UGX ' + cost.toLocaleString();
    } else {
      alert('Please enter both distance and weight (must be greater than 0)');
    }
  }
  
  function resetForm() {
    document.getElementById('customerName').value = '';
    document.getElementById('location').value = '';
    document.getElementById('distance').value = '';
    document.getElementById('weight').value = '';
    document.getElementById('totalCost').innerHTML = 'UGX 0';
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
