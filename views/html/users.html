<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NyondoStock - User Management</title>
    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/public/css/user.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark px-3">
      <a class="navbar-brand" href="#"> NyondoStock - User Management</a>
      <button
        class="btn btn-gold ms-auto"
        onclick="window.location.href = 'admindash.html'"
      >
        ← Back to Dashboard
      </button>
    </nav>

    <!-- Page Header -->
    <div class="container my-4">
      <div
        class="d-flex justify-content-between align-items-center flex-wrap gap-2"
      >
        <h2 class="fw-bold">User Management</h2>
        <button
          class="btn btn-gold"
          data-bs-toggle="modal"
          data-bs-target="#addUserModal"
        >
          Add New User
        </button>
      </div>

      <!-- Search & Filter -->
      <div class="row my-4">
        <div class="col-md-6 mb-2">
          <input
            type="text"
            id="searchInput"
            class="form-control"
            placeholder="🔍 Search by name or email..."
          />
        </div>
        <div class="col-md-6 mb-2">
          <select id="roleFilter" class="form-select">
            <option value="All">All Roles</option>
            <option value="Admin">Admin</option>
            <option value="Manager">Manager</option>
            <option value="Salesperson">Salesperson</option>
          </select>
        </div>
      </div>

      <!-- Users Table -->
      <div class="table-responsive">
        <table
          class="table table-dark table-hover align-middle"
          id="usersTable"
        >
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
              <th>Status</th>
              <th>Sales (Month)</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="usersTableBody">
            <!-- Users will be loaded dynamically -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- Add User Modal -->
    <div class="modal fade" id="addUserModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title text-warning">Add New User</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <form id="addUserForm" action="" method="">
              <div class="mb-3">
                <label class="form-label">Full Name *</label>
                <input
                  type="text"
                  name="fullname"
                  class="form-control"
                  id="userName"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Email Address *</label>
                <input
                  type="email"
                  name="email"
                  class="form-control"
                  id="userEmail"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Password*</label>
                <input
                  type="password"
                  name="password"
                  class="form-control"
                  id="userPassword"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Role *</label>
                <select class="form-select" name="role" id="userRole" required>
                  <option value="Admin">Admin</option>
                  <option value="Manager">Manager</option>
                  <option value="Salesperson">Salesperson</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label">Status *</label>
                <select
                  class="form-select"
                  name="status"
                  role="status"
                  id="userStatus"
                  required
                >
                  <option value="Active">Active</option>
                  <option value="Inactive">Inactive</option>
                </select>
              </div>
              <button type="submit" class="btn btn-gold w-100">Add User</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- Edit User Modal -->
    <div class="modal fade" id="editUserModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title text-warning">Edit User</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <form id="editUserForm" action="" method="">
              <input type="hidden" id="editUserId" />
              <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input
                  type="text"
                  name="fullname"
                  class="form-control"
                  id="editUserName"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input
                  type="email"
                  name="email"
                  class="form-control"
                  id="editUserEmail"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Role</label>
                <select
                  class="form-select"
                  name="role"
                  id="editUserRole"
                  required
                >
                  <option value="Admin">Admin</option>
                  <option value="Manager">Manager</option>
                  <option value="Salesperson">Salesperson</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label">Status</label>
                <select
                  class="form-select"
                  name="status"
                  id="editUserStatus"
                  required
                >
                  <option value="Active">Active</option>
                  <option value="Inactive">Inactive</option>
                </select>
              </div>
              <button type="submit" class="btn btn-gold w-100">
                Save Changes
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/public/Js/user.js"></script>
  </body>
</html>
